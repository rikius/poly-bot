services:

  # ---------------------------------------------------------------------------
  # dev — Rust toolchain with source mounted; use for cargo commands
  #
  #   docker compose run --rm dev              # cargo build (default)
  #   docker compose run --rm dev cargo test
  #   docker compose run --rm dev cargo check
  #   docker compose run --rm dev cargo clippy
  #   docker compose run --rm dev cargo build --release
  # ---------------------------------------------------------------------------
  dev:
    build:
      context: .
      target: dev
    working_dir: /build
    volumes:
      - .:/build                               # live source — edits reflected immediately
      - cargo-registry:/usr/local/cargo/registry  # cache downloaded crates
      - cargo-git:/usr/local/cargo/git
      - target-cache:/build/target             # cache compiled artifacts
    command: cargo build
    environment:
      - RUST_LOG=info
      - CARGO_TERM_COLOR=always

  # ---------------------------------------------------------------------------
  # test — same as dev but runs cargo test by default
  # ---------------------------------------------------------------------------
  test:
    build:
      context: .
      target: dev
    working_dir: /build
    volumes:
      - .:/build
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/build/target
    command: cargo test
    environment:
      - RUST_LOG=info
      - CARGO_TERM_COLOR=always

  # ---------------------------------------------------------------------------
  # bot — production image; runs the trading bot
  #
  #   docker compose up bot                    # start bot (paper mode)
  #   docker compose logs -f bot               # tail logs
  #   docker exec $(docker compose ps -q bot) touch /tmp/polybot_kill
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    volumes:
      - ledger-data:/app/data
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=full
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # frontend-dev — Vite dev server with HMR, proxies /api and /ws to bot
  #
  #   docker compose up frontend-dev
  # ---------------------------------------------------------------------------
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NODE_ENV=development

  # ---------------------------------------------------------------------------
  # frontend-build — builds the frontend for production (outputs to frontend/dist)
  #
  #   docker compose run --rm frontend-build
  # ---------------------------------------------------------------------------
  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run build"

volumes:
  ledger-data:
  cargo-registry:
  cargo-git:
  target-cache:
  frontend-node-modules:
